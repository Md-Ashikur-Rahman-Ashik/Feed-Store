<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Feed Store</title>

    <!-- Tailwind CSS (Play CDN — generates styles from dynamic HTML) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide Icons (UMD build — exposes window.lucide) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
      /* Base */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #f5f3ef;
        color: #1c1917;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Prevent iOS zoom on input focus (requires 16px font) */
      input,
      textarea,
      select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }

      /* Smooth scroll */
      html {
        scroll-behavior: smooth;
      }

      /* Focus visible for keyboard users */
      :focus-visible {
        outline: 2px solid #b45309;
        outline-offset: 2px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }

      /* Scrollbar styling (subtle) */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d6d3d1;
        border-radius: 4px;
      }

      /* Prevent text selection on interactive elements */
      button,
      nav,
      .nav-btn {
        -webkit-user-select: none;
        user-select: none;
      }

      /* More sheet transition — Tailwind CDN doesn't support custom transitions well */
      #more-sheet {
        transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      }

      /* Loading state */
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #78716c;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">Loading...</div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
