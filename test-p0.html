<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P0: Data Foundation Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f7f4;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --card: #ffffff;
        --border: #e5e2db;
        --accent: #0d9668;
        --accent-light: #ecfdf5;
        --error: #dc2626;
        --error-light: #fef2f2;
        --warn: #d97706;
        --warn-light: #fffbeb;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        padding: 24px 16px;
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      .log-line {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13.5px;
        line-height: 1.5;
        animation: fadeIn 0.15s ease-out;
      }
      .log-line.pass {
        background: var(--accent-light);
        color: #065f46;
      }
      .log-line.fail {
        background: var(--error-light);
        color: #991b1b;
      }
      .log-line.info {
        background: #f0f0f0;
        color: var(--muted);
      }
      .log-line.warn {
        background: var(--warn-light);
        color: #92400e;
      }
      .log-line.section {
        background: transparent;
        color: var(--fg);
        font-weight: 600;
        font-size: 14px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }
      .log-icon {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 11px;
        border-radius: 50%;
        margin-top: 1px;
      }
      .log-line.pass .log-icon {
        background: #059669;
        color: white;
      }
      .log-line.fail .log-icon {
        background: #dc2626;
        color: white;
      }
      .log-line.info .log-icon {
        background: #d1d5db;
        color: white;
      }
      .log-line.warn .log-icon {
        background: #d97706;
        color: white;
      }
      .log-line.section .log-icon {
        background: var(--fg);
        color: white;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .schema-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px;
        margin-top: 6px;
      }
      .schema-table th {
        text-align: left;
        padding: 6px 10px;
        background: #f3f2ef;
        font-weight: 600;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
      }
      .schema-table td {
        padding: 5px 10px;
        border-bottom: 1px solid #f0efec;
      }
      .schema-table tr:last-child td {
        border-bottom: none;
      }
      .badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-pk {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge-idx {
        background: #e0e7ff;
        color: #3730a3;
      }
      .badge-sync {
        background: #f3e8ff;
        color: #6b21a8;
      }
    </style>
  </head>
  <body>
    <div style="max-width: 720px; margin: 0 auto 24px">
      <div
        style="
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 4px;
        "
      >
        <div
          style="
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
          "
        ></div>
        <h1 style="font-size: 20px; font-weight: 700; letter-spacing: -0.3px">
          P0: Data Foundation Verification
        </h1>
      </div>
      <p style="color: var(--muted); font-size: 14px; padding-left: 20px">
        Database schema, seed data, service contracts, UUID generation
      </p>
    </div>
    <div
      id="log"
      style="
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      "
    ></div>
    <div
      id="schema-summary"
      style="max-width: 720px; margin: 24px auto 0; display: none"
    >
      <h2
        style="
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 12px;
          padding-left: 4px;
        "
      >
        Schema Summary
      </h2>
      <div id="schema-tables"></div>
    </div>
    <div
      id="final-status"
      style="max-width: 720px; margin: 24px auto 0; display: none"
    ></div>

    <script type="module">
      import db from "./js/db/schema.js";
      import { seedCategories } from "./js/db/seed.js";
      import { uuid, nowISO, todayDate } from "./js/utils/uuid.js";
      import { CONFIG, CATEGORY_COLORS } from "./js/config.js";

      // Import all service stubs to verify they load without errors
      import ProductService from "./js/services/productService.js";
      import CustomerService from "./js/services/customerService.js";
      import SupplierService from "./js/services/supplierService.js";
      import SaleService from "./js/services/saleService.js";
      import PurchaseService from "./js/services/purchaseService.js";
      import ReportService from "./js/services/reportService.js";
      import SettingsService from "./js/services/settingsService.js";
      import BackupService from "./js/services/backupService.js";

      // ===================== LOGGING =====================

      const logEl = document.getElementById("log");
      let passCount = 0;
      let failCount = 0;

      function log(type, text) {
        const div = document.createElement("div");
        div.className = `log-line ${type}`;
        const icons = {
          pass: "\u2713",
          fail: "\u2717",
          info: "i",
          warn: "!",
          section: "\u25B6",
        };
        div.innerHTML = `<span class="log-icon">${icons[type] || "?"}</span><span>${text}</span>`;
        logEl.appendChild(div);
        if (type === "pass") passCount++;
        if (type === "fail") failCount++;
      }

      // ===================== TESTS =====================

      async function run() {
        log("section", "Phase 0: Data Foundation Verification");

        // --- CONFIG ---
        log("section", "1. Configuration");
        log(
          "info",
          `Database name: <span class="mono">${CONFIG.DB_NAME}</span>`,
        );
        log(
          "info",
          `Database version: <span class="mono">${CONFIG.DB_VERSION}</span>`,
        );
        log("info", `Currency: <span class="mono">${CONFIG.CURRENCY}</span>`);
        log(
          "info",
          `Units: <span class="mono">${CONFIG.UNITS.join(", ")}</span>`,
        );
        log(
          "info",
          `Transaction types: <span class="mono">${CONFIG.TRANSACTION_TYPES.join(", ")}</span>`,
        );
        log(
          "info",
          `Payment methods: <span class="mono">${CONFIG.PAYMENT_METHODS.join(", ")}</span>`,
        );
        log(
          "info",
          `Sync statuses: <span class="mono">${CONFIG.SYNC_STATUSES.join(", ")}</span>`,
        );

        CONFIG.CURRENCY === "৳"
          ? log("pass", "Currency symbol is correct (৳)")
          : log("fail", "Currency symbol is wrong");
        CONFIG.UNITS.includes("KG")
          ? log("pass", "KG is in units list")
          : log("fail", "KG missing from units");

        // --- UUID ---
        log("section", "2. UUID Generation");
        const id1 = uuid();
        const id2 = uuid();
        const uuidRegex =
          /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        uuidRegex.test(id1)
          ? log(
              "pass",
              `Generated valid UUID: <span class="mono">${id1}</span>`,
            )
          : log("fail", `Invalid UUID: <span class="mono">${id1}</span>`);
        id1 !== id2
          ? log(
              "pass",
              `Two UUIDs are unique: <span class="mono">${id1.substring(0, 8)}...</span> vs <span class="mono">${id2.substring(0, 8)}...</span>`,
            )
          : log("fail", "Two UUIDs are identical — collision!");
        typeof nowISO() === "string" && nowISO().includes("T")
          ? log(
              "pass",
              `nowISO() returns ISO string: <span class="mono">${nowISO().substring(0, 19)}</span>`,
            )
          : log("fail", "nowISO() returned invalid value");
        /^\d{4}-\d{2}-\d{2}$/.test(todayDate())
          ? log(
              "pass",
              `todayDate() returns YYYY-MM-DD: <span class="mono">${todayDate()}</span>`,
            )
          : log("fail", `todayDate() returned invalid value: ${todayDate()}`);

        // --- DATABASE OPEN ---
        log("section", "3. Database Initialization");
        try {
          log("info", "Opening IndexedDB via Dexie...");
          await db.open();
          log(
            "pass",
            `Database "<span class="mono">${CONFIG.DB_NAME}</span>" opened successfully`,
          );
        } catch (e) {
          log("fail", `Database open failed: ${e.message}`);
          return showFinal();
        }

        // Verify all tables exist
        const expectedTables = [
          "settings",
          "categories",
          "products",
          "customers",
          "suppliers",
          "transactions",
          "transaction_items",
          "ledger_entries",
          "cash_book",
          "daily_summaries",
          "stock_adjustments",
        ];
        log(
          "info",
          `Expected tables: <span class="mono">${expectedTables.join(", ")}</span>`,
        );
        const actualTables = db.tables.map((t) => t.name);
        for (const tableName of expectedTables) {
          actualTables.includes(tableName)
            ? log(
                "pass",
                `Table "<span class="mono">${tableName}</span>" exists`,
              )
            : log(
                "fail",
                `Table "<span class="mono">${tableName}</span>" MISSING`,
              );
        }

        // --- SEED DATA ---
        log("section", "4. Seed Data");
        try {
          await seedCategories();
          log("info", "seedCategories() executed without error");
        } catch (e) {
          log("fail", `seedCategories() failed: ${e.message}`);
        }

        const categories = await db.categories.toArray();
        categories.length === 3
          ? log("pass", `Exactly 3 categories seeded`)
          : log("fail", `Expected 3 categories, found ${categories.length}`);

        const poultry = categories.find((c) => c.slug === "poultry");
        const fish = categories.find((c) => c.slug === "fish");
        const cow = categories.find((c) => c.slug === "cow");

        if (poultry) {
          poultry.color === CATEGORY_COLORS.poultry
            ? log(
                "pass",
                `Poultry: color = <span class="mono">${poultry.color}</span>`,
              )
            : log(
                "fail",
                `Poultry color mismatch: ${poultry.color} vs ${CATEGORY_COLORS.poultry}`,
              );
          poultry.id === "11111111-1111-1111-1111-111111111111"
            ? log("pass", "Poultry: fixed UUID correct")
            : log("fail", `Poultry UUID wrong: ${poultry.id}`);
        } else {
          log("fail", "Poultry category not found");
        }

        if (fish) {
          fish.color === CATEGORY_COLORS.fish
            ? log(
                "pass",
                `Fish: color = <span class="mono">${fish.color}</span>`,
              )
            : log("fail", `Fish color mismatch`);
          fish.id === "22222222-2222-2222-2222-222222222222"
            ? log("pass", "Fish: fixed UUID correct")
            : log("fail", "Fish UUID wrong");
        } else {
          log("fail", "Fish category not found");
        }

        if (cow) {
          cow.color === CATEGORY_COLORS.cow
            ? log("pass", `Cow: color = <span class="mono">${cow.color}</span>`)
            : log("fail", `Cow color mismatch`);
          cow.id === "33333333-3333-3333-3333-333333333333"
            ? log("pass", "Cow: fixed UUID correct")
            : log("fail", "Cow UUID wrong");
        } else {
          log("fail", "Cow category not found");
        }

        // Idempotency test: run seed again, should still be 3
        await seedCategories();
        const afterReseed = await db.categories.count();
        afterReseed === 3
          ? log(
              "pass",
              "Seed is idempotent — re-seeding still produces exactly 3 categories",
            )
          : log(
              "fail",
              `Seed is NOT idempotent — after re-seed: ${afterReseed}`,
            );

        // --- WRITE/READ TEST ---
        log("section", "5. Write & Read Verification");

        // Test product write
        const testProductId = uuid();
        await db.products.put({
          id: testProductId,
          name: "Test Broiler Feed",
          category_id: poultry.id,
          brand: "TestBrand",
          unit: "KG",
          cost_price: 70,
          selling_price: 85,
          stock_quantity: 500,
          min_stock_level: 100,
          is_active: true,
          created_at: nowISO(),
          updated_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readProduct = await db.products.get(testProductId);
        readProduct &&
        readProduct.name === "Test Broiler Feed" &&
        readProduct.selling_price === 85
          ? log("pass", "Product: write and read round-trip successful")
          : log("fail", "Product: write/read mismatch");

        // Test customer write
        const testCustId = uuid();
        await db.customers.put({
          id: testCustId,
          name: "Test Customer",
          phone: "01700000000",
          address: "Test Address",
          balance: 0,
          is_active: true,
          created_at: nowISO(),
          updated_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readCust = await db.customers.get(testCustId);
        readCust && readCust.name === "Test Customer"
          ? log("pass", "Customer: write and read round-trip successful")
          : log("fail", "Customer: write/read mismatch");

        // Test transaction write
        const testTxId = uuid();
        await db.transactions.put({
          id: testTxId,
          type: "SALE",
          customer_id: testCustId,
          supplier_id: null,
          transaction_date: todayDate(),
          subtotal: 850,
          discount: 0,
          total_amount: 850,
          payment_method: "CREDIT",
          amount_paid: 0,
          amount_due: 850,
          notes: null,
          item_count: 1,
          total_quantity: 10,
          created_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readTx = await db.transactions.get(testTxId);
        readTx && readTx.type === "SALE" && readTx.amount_due === 850
          ? log("pass", "Transaction: write and read round-trip successful")
          : log("fail", "Transaction: write/read mismatch");

        // Test transaction item write
        const testItemId = uuid();
        await db.transaction_items.put({
          id: testItemId,
          transaction_id: testTxId,
          product_id: testProductId,
          quantity: 10,
          unit_price: 85,
          total: 850,
          created_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readItem = await db.transaction_items.get(testItemId);
        readItem && readItem.total === 850
          ? log(
              "pass",
              "Transaction item: write and read round-trip successful",
            )
          : log("fail", "Transaction item: write/read mismatch");

        // Test ledger entry write
        const testLedgerId = uuid();
        await db.ledger_entries.put({
          id: testLedgerId,
          entity_type: "CUSTOMER",
          entity_id: testCustId,
          transaction_id: testTxId,
          entry_date: todayDate(),
          description: "Test sale — credit given",
          debit: 850,
          credit: 0,
          running_balance: 850,
          created_at: nowISO(),
          created_by: null,
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readLedger = await db.ledger_entries.get(testLedgerId);
        readLedger && readLedger.running_balance === 850
          ? log("pass", "Ledger entry: write and read round-trip successful")
          : log("fail", "Ledger entry: write/read mismatch");

        // Test cash book write
        const testCashId = uuid();
        await db.cash_book.put({
          id: testCashId,
          entry_date: todayDate(),
          opening_balance: 0,
          total_in: 0,
          total_out: 0,
          closing_balance: 0,
          transaction_id: testTxId,
          description: "Test sale — no cash",
          created_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readCash = await db.cash_book.get(testCashId);
        readCash
          ? log("pass", "Cash book: write and read round-trip successful")
          : log("fail", "Cash book: write/read mismatch");

        // Test daily summary write
        const testSummaryId = uuid();
        await db.daily_summaries.put({
          id: testSummaryId,
          summary_date: todayDate(),
          total_sales: 850,
          total_sales_return: 0,
          total_purchases: 0,
          total_purchases_return: 0,
          total_cash_received: 0,
          total_credit_given: 850,
          total_cash_paid: 0,
          total_credit_used: 0,
          net_sales: 850,
          net_purchases: 0,
          estimated_profit: 150,
          sale_count: 1,
          purchase_count: 0,
          created_at: nowISO(),
          updated_at: nowISO(),
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readSummary = await db.daily_summaries.get(testSummaryId);
        readSummary && readSummary.estimated_profit === 150
          ? log("pass", "Daily summary: write and read round-trip successful")
          : log("fail", "Daily summary: write/read mismatch");

        // Test stock adjustment write
        const testAdjId = uuid();
        await db.stock_adjustments.put({
          id: testAdjId,
          product_id: testProductId,
          adjustment_date: todayDate(),
          quantity: -5,
          reason: "Test — damaged bags",
          reference: "damaged",
          created_at: nowISO(),
          created_by: null,
          syncStatus: "PENDING",
          syncedAt: null,
        });
        const readAdj = await db.stock_adjustments.get(testAdjId);
        readAdj && readAdj.quantity === -5
          ? log(
              "pass",
              "Stock adjustment: write and read round-trip successful",
            )
          : log("fail", "Stock adjustment: write/read mismatch");

        // --- INDEX / QUERY TESTS ---
        log("section", "6. Index & Query Verification");

        // Query by compound index: [category_id+is_active]
        const activePoultry = await db.products
          .where("[category_id+is_active]")
          .equals([poultry.id, true])
          .toArray();
        activePoultry.length >= 1
          ? log(
              "pass",
              `Compound index [category_id+is_active]: found ${activePoultry.length} active poultry product(s)`,
            )
          : log(
              "fail",
              "Compound index [category_id+is_active]: returned no results",
            );

        // Query by compound index: [type+transaction_date]
        const todaySales = await db.transactions
          .where("[type+transaction_date]")
          .equals(["SALE", todayDate()])
          .toArray();
        todaySales.length >= 1
          ? log(
              "pass",
              `Compound index [type+transaction_date]: found ${todaySales.length} sale(s) today`,
            )
          : log(
              "fail",
              "Compound index [type+transaction_date]: returned no results",
            );

        // Query by compound index: [entity_type+entity_id]
        const custLedger = await db.ledger_entries
          .where("[entity_type+entity_id]")
          .equals(["CUSTOMER", testCustId])
          .toArray();
        custLedger.length >= 1
          ? log(
              "pass",
              `Compound index [entity_type+entity_id]: found ${custLedger.length} ledger entry(ies) for test customer`,
            )
          : log(
              "fail",
              "Compound index [entity_type+entity_id]: returned no results",
            );

        // Query by syncStatus (for future sync queue)
        const pendingRecords = await db.products
          .where("syncStatus")
          .equals("PENDING")
          .count();
        pendingRecords >= 1
          ? log(
              "pass",
              `syncStatus index: found ${pendingRecords} pending product(s)`,
            )
          : log("fail", "syncStatus index: returned 0 pending products");

        // --- CLEANUP TEST DATA ---
        log("section", "7. Cleanup");
        await db.transaction_items.delete(testItemId);
        await db.ledger_entries.delete(testLedgerId);
        await db.cash_book.delete(testCashId);
        await db.daily_summaries.delete(testSummaryId);
        await db.stock_adjustments.delete(testAdjId);
        await db.transactions.delete(testTxId);
        await db.products.delete(testProductId);
        await db.customers.delete(testCustId);
        log("pass", "All test records deleted");

        // Verify cleanup
        const remaining = await db.products.count();
        remaining === 0
          ? log("pass", "Products table is clean (0 records after cleanup)")
          : log(
              "warn",
              `Products table has ${remaining} record(s) remaining — expected 0`,
            );

        // --- SERVICE STUBS ---
        log("section", "8. Service Layer Stubs");
        const services = {
          ProductService,
          CustomerService,
          SupplierService,
          SaleService,
          PurchaseService,
          ReportService,
          SettingsService,
          BackupService,
        };
        for (const [name, svc] of Object.entries(services)) {
          const methodCount = Object.keys(svc).length;
          const firstResult = await Object.values(svc)[0]();
          firstResult.success === false &&
          firstResult.error.includes("Not implemented")
            ? log(
                "pass",
                `<span class="mono">${name}</span>: ${methodCount} method(s), all correctly return "Not implemented"`,
              )
            : log(
                "fail",
                `<span class="mono">${name}</span>: stub returned unexpected result`,
              );
        }

        // --- SCHEMA SUMMARY ---
        log("section", "9. Schema Summary");
        renderSchemaSummary();

        // --- FINAL ---
        showFinal();
      }

      function renderSchemaSummary() {
        const container = document.getElementById("schema-tables");
        const summaryEl = document.getElementById("schema-summary");
        summaryEl.style.display = "block";

        // Describe each table's schema for documentation
        const schemaDef = {
          settings: {
            fields: [
              {
                name: "id",
                type: "UUID",
                role: "PK",
                note: "Fixed: 00000000-...",
              },
            ],
          },
          categories: {
            fields: [
              { name: "id", type: "UUID", role: "PK" },
              { name: "name", type: "TEXT" },
              { name: "slug", type: "TEXT", role: "IDX", note: "UNIQUE" },
              { name: "color", type: "TEXT", note: "Hex color" },
              { name: "sort_order", type: "INT" },
              { name: "is_active", type: "BOOL", role: "IDX" },
              { name: "created_at", type: "TIMESTAMPTZ" },
            ],
          },
          products: {
            fields: [
              { name: "id", type: "UUID", role: "PK" },
              { name: "name", type: "TEXT" },
              { name: "category_id", type: "UUID", role: "FK → categories" },
              { name: "brand", type: "TEXT" },
              { name: "unit", type: "TEXT", note: "Default: KG" },

          suppliers: {

          transactions: {
            fields: [

              },
              { name: "customer_id", type: "UUID", role: "FK → customers" },
              { name: "supplier_id", type: "UUID", role: "FK → suppliers" },
              { name: "transaction_date", type: "DATE", role: "IDX" },
              { name: "subtotal", type: "DECIMAL" },
              { name: "discount", type: "DECIMAL" },
              { name: "total_amount", type: "DECIMAL" },
              {
                name: "payment_method",

              { name: "amount_paid", type: "DECIMAL" },
              { name: "amount_due", type: "DECIMAL" },
              { name: "notes", type: "TEXT" },

              { name: "total_quantity", type: "DECIMAL" },
              { name: "created_at", type: "TIMESTAMPTZ" },

          ledger_entries: {

              { name: "credit", type: "DECIMAL" },
              { name: "running_balance", type: "DECIMAL" },

              { name: "syncedAt", type: "TIMESTAMPTZ" },
            ],
            indexes: ["[entity_type+entity_id]"],
            note: "IMMUTABLE — no updates, no deletes",
          },
          cash_book: {
            fields: [
              { name: "id", type: "UUID", role: "PK" },
              { name: "entry_date", type: "DATE", role: "IDX" },
              { name: "opening_balance", type: "DECIMAL" },
              { name: "total_in", type: "DECIMAL" },
              { name: "total_out", type: "DECIMAL" },
              { name: "closing_balance", type: "DECIMAL" },
              {
                name: "transaction_id",
                type: "UUID",
                role: "FK → transactions",
              },

            ],
          },
          daily_summaries: {
            fields: [

          stock_adjustments: {

              { name: "id", type: "UUID", role: "PK" },

                type: "TEXT",

              { name: "syncedAt", type: "TIMESTAMPTZ" },
            ],
          },
        };

        for (const [tableName, def] of Object.entries(schemaDef)) {
          const div = document.createElement("div");
          div.style.marginBottom = "16px";

          let indexHtml = "";
          if (def.indexes) {
            indexHtml = `<span style="color: var(--muted); font-size: 12px; margin-left: 8px;">Compound indexes: <span class="mono">${def.indexes.join(", ")}</span></span>`;
          }
          let noteHtml = "";
          if (def.note) {
            noteHtml = `<span style="color: #DC2626; font-size: 12px; font-weight: 600; margin-left: 8px;">${def.note}</span>`;
          }

          let rows = def.fields
            .map((f) => {
              let roleBadge = "";
              if (f.role === "PK")
                roleBadge = '<span class="badge badge-pk">PK</span>';
              else if (f.role === "IDX")
                roleBadge = '<span class="badge badge-idx">IDX</span>';
              else if (f.role && f.role.startsWith("FK"))
                roleBadge = `<span class="badge badge-fk">FK</span>`;
              else if (f.role === "SYNC")
                roleBadge = '<span class="badge badge-sync">SYNC</span>';

              let noteCell = f.note
                ? `<span style="color: var(--muted); font-size: 11.5px;">${f.note}</span>`
                : "";
              return `<tr>
                        <td class="mono" style="font-size: 12px;">${f.name}</td>
                        <td class="mono" style="font-size: 12px; color: var(--muted);">${f.type}</td>
                        <td>${roleBadge}</td>
                        <td>${noteCell}</td>
                    </tr>`;
            })
            .join("");

          div.innerHTML = `
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <span class="mono" style="font-weight: 600; font-size: 13.5px;">${tableName}</span>
                        ${indexHtml}${noteHtml}
                    </div>
                    <table class="schema-table">
                        <thead><tr><th>Field</th><th>Type</th><th>Role</th><th>Note</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
          container.appendChild(div);
        }
      }

      function showFinal() {
        const el = document.getElementById("final-status");
        el.style.display = "block";

        if (failCount === 0) {
          el.innerHTML = `
                    <div style="background: var(--accent-light); border: 1px solid #A7F3D0; border-radius: 10px; padding: 20px 24px;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <div style="width: 28px; height: 28px; border-radius: 50%; background: #059669; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px;">\u2713</div>
                            <span style="font-size: 18px; font-weight: 700; color: #065F46;">P0 COMPLETE — ALL ${passCount} CHECKS PASSED</span>
                        </div>
                        <p style="color: #065F46; font-size: 14px; margin-left: 38px;">
                            Database schema is verified. Seed data is correct. All indexes work.
                            Service stubs are in place. Ready for P1.
                        </p>
                        <p style="color: #065F46; font-size: 13px; margin-left: 38px; margin-top: 8px; opacity: 0.8;">
                            Next: Close this tab. Run the git commands below to commit P0.
                        </p>
                    </div>
                `;
        } else {
          el.innerHTML = `
                    <div style="background: var(--error-light); border: 1px solid #FECACA; border-radius: 10px; padding: 20px 24px;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <div style="width: 28px; height: 28px; border-radius: 50%; background: #DC2626; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px;">\u2717</div>
                            <span style="font-size: 18px; font-weight: 700; color: #991B1B;">P0 FAILED — ${failCount} CHECK(S) FAILED</span>
                        </div>
                        <p style="color: #991B1B; font-size: 14px; margin-left: 38px;">
                            Do not proceed to P1. Scroll up and find the red lines.
                            Fix the issue, refresh this page, and re-run.
                        </p>
                    </div>
                `;
        }
      }

      // Start the verification
      run();
    </script>
